workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: master
          include: true
          source: true

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Check project files
        script: |
          pwd
          ls -la

      - name: Generate wrapper if missing
        script: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace --no-daemon

    artifacts:
      - app/build/outputs/**/*.apk
      - build/**/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - ullahmohammad314@gmail.com
        notify:
          success: true
          failure: true
