<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanchayan BD – Offline</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 16px;
            display: block;
        }
        h1 {
            color: #1565C0;
            font-size: 22px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .brand {
            font-size: 13px;
            color: #aaa;
            margin-top: 24px;
        }
        button {
            background: #1565C0;
            color: #fff;
            border: none;
            padding: 13px 32px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        button:active { background: #003c8f; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📡</span>
        <h1>You're Offline</h1>
        <p>
            It looks like you're not connected to the internet.<br/>
            Please check your connection and try again.
        </p>
        <button onclick="window.location.reload()">Try Again</button>
        <div class="brand">Sanchayan BD</div>
    </div>
</body>
</html>
